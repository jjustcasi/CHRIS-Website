<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | CHRIS Website Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body onload="ensureLoggedOut()">
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="index.html">CHRIS Website Portal</a>
      <div class="nav-actions">
        <a class="btn btn-outline" href="signup.html">Sign Up</a>
        <a class="btn btn-outline" href="admin.html">Admin</a>
      </div>
    </div>
  </header>

  <main class="page-wrap auth-layout">
    <section class="auth-card">
      <h2>Welcome Back</h2>
      <p>Login to access your leave and training dashboard.</p>
      <form class="form" onsubmit="event.preventDefault(); login();">
        <div>
          <label for="loginEmail">Email</label>
          <input id="loginEmail" type="email" required>
        </div>
        <div>
          <label for="loginPassword">Password</label>
          <div class="password-input-wrap">
            <input id="loginPassword" type="password" required>
            <button id="toggleLoginPassword" class="password-eye-toggle" type="button" aria-label="Show password" title="Show password">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M12 5C6.5 5 2.15 8.25 1 12c1.15 3.75 5.5 7 11 7s9.85-3.25 11-7c-1.15-3.75-5.5-7-11-7zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm0-6.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5z"></path>
              </svg>
            </button>
          </div>
        </div>
        <button class="btn btn-primary" type="submit">Login</button>
      </form>
      <div id="authMessage" class="message"></div>
      <div class="inline-links">
        <a class="btn btn-outline" href="signup.html">Need an account?</a>
        <a class="btn btn-outline" href="admin.html">Open admin page</a>
      </div>
    </section>
  </main>

<script src="auth.js"></script>
</body>
</html>
